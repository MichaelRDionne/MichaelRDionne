name: weekly portfolio status

on:
  schedule:
    - cron: "30 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate portfolio status
        run: python scripts/update_portfolio_status.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit status update if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update weekly portfolio status"
          file_pattern: docs/portfolio-status.md
